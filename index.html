  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #030712;
      overflow: hidden;
    }

    .loader-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
      background: radial-gradient(circle at 30% 30%, rgba(99, 102, 241, 0.15), transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(236, 72, 153, 0.15), transparent 50%),
                  #030712;
      z-index: 9999;
      transition: opacity 0.6s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .loader-wrap.hide {
      opacity: 0;
      pointer-events: none;
    }

    .logo {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #4D94FF 0%, #66E0FF 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: pulse 2s ease-in-out infinite;
    }

    .ring {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #4D94FF;
      border-right-color: #66E0FF;
      animation: spin 1s linear infinite;
    }

    .label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .om {
      font-size: 40px;
      line-height: 1;
      color: #FF7A00;
      text-shadow: 0 0 18px rgba(255, 122, 0, 0.45);
      animation: pulse 2s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="loader-wrap" id="loader">
    <div class="om">ॐ</div>
    <div class="logo">AD.</div>
    <div class="ring"></div>
    <div class="label">Loading Portfolio</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loader');
      if (loader) {
        loader.classList.add('hide');
        setTimeout(() => loader.remove(), 700);
      }
      document.documentElement.style.overflow = 'auto';
      document.body.style.overflow = 'auto';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
